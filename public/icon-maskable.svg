<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Plant or Pull">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f7a5a"/>
      <stop offset="55%" stop-color="#145a44"/>
      <stop offset="100%" stop-color="#0b3d2e"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="leafDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background for maskable safe-zone -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <!-- Content kept inside the recommended 80% safe zone (256 ± 205) -->
  <g transform="translate(256 256) scale(0.78) translate(-256 -256)">
    <circle cx="392" cy="120" r="42" fill="#f5c84b" opacity="0.85"/>
    <circle cx="392" cy="120" r="62" fill="#f5c84b" opacity="0.18"/>

    <path d="M48 388
             C 140 348, 220 410, 300 380
             C 380 350, 440 392, 464 380
             L 464 488
             L 48 488 Z"
          fill="#0a2f24" opacity="0.85"/>
    <path d="M48 408
             C 140 372, 230 432, 320 402
             C 400 376, 440 412, 464 404
             L 464 488
             L 48 488 Z"
          fill="#06241b"/>

    <path d="M120 444 q 18 -10 36 0 t 36 0 t 36 0 t 36 0 t 36 0 t 36 0"
          stroke="#86efac" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round"/>

    <g transform="translate(256 388)">
      <path d="M0 0 C -2 -60, -2 -120, 0 -180"
            stroke="#15803d" stroke-width="10" stroke-linecap="round" fill="none"/>

      <path d="M0 -90
               C -70 -100, -110 -150, -100 -195
               C -55 -205, -10 -160, 0 -120 Z"
            fill="url(#leafDark)" stroke="#0f766e" stroke-width="4" stroke-linejoin="round"/>
      <path d="M-92 -185 C -70 -160, -40 -140, -8 -125"
            stroke="#064e3b" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>

      <path d="M0 -120
               C 80 -135, 130 -195, 118 -250
               C 60 -262, 8 -210, 0 -160 Z"
            fill="url(#leaf)" stroke="#0f766e" stroke-width="4" stroke-linejoin="round"/>
      <path d="M108 -240 C 80 -210, 50 -185, 10 -165"
            stroke="#064e3b" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>

      <path d="M0 -180
               C -22 -196, -28 -226, -14 -244
               C 8 -240, 16 -212, 4 -190 Z"
            fill="url(#leaf)" stroke="#0f766e" stroke-width="3" stroke-linejoin="round"/>

      <ellipse cx="0" cy="6" rx="64" ry="14" fill="#3b2412" opacity="0.7"/>
      <ellipse cx="0" cy="2" rx="58" ry="10" fill="#5b3a1f"/>
    </g>
  </g>
</svg>
